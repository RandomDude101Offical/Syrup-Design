<!DOCTYPE html>
<html>
	<head>
		<title>Syrup Design 1</title>
		<link rel="stylesheet" href="syrup.css">
	</head>
	<body>
		<h1>Hello!</h1>

		<p style="--z: 3;">This is a parapraph with a higher Z</p>

			<div class="srwindow-titlebar">
				<p>hi</p>
			</div>
			this is a window

			<option value="thing1">Thing 1</option>
			<option value="thing2">Thing 2</option>
			<option value="thing3">Thing 3</option>
